services:
  dev:
    image: oven/bun:1.1
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    volumes:
      - ./:/app
      - demochain2_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CHOKIDAR_USEPOLLING=true

  prod:
    build: .
    ports:
      - "8080:80"

volumes:
  demochain2_node_modules:

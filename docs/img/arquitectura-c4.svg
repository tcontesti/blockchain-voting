<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#388bfd"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Arquitectura C4 — Contenidors</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Sistema de Votacio Electronica basat en Blockchain</text>

  <!-- Actor: Votant -->
  <rect x="355" y="78" width="190" height="60" rx="8" fill="#1c2128" stroke="#388bfd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="104" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">Votant</text>
  <text x="450" y="122" text-anchor="middle" fill="#8b949e" font-size="10">Persona del cens electoral</text>

  <!-- Container 1: Frontend React -->
  <rect x="40" y="180" width="240" height="120" rx="10" fill="#1c2128" stroke="#388bfd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="180" width="240" height="26" rx="10" fill="#1f6feb"/>
  <rect x="40" y="196" width="240" height="10" fill="#1f6feb"/>
  <text x="160" y="198" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">APLICACIO WEB</text>
  <text x="160" y="228" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Thin Client</text>
  <text x="160" y="246" text-anchor="middle" fill="#8b949e" font-size="10">React 19 + Tailwind CSS + Bun</text>
  <text x="160" y="260" text-anchor="middle" fill="#8b949e" font-size="10">algosdk + WalletConnect SDK</text>
  <text x="160" y="278" text-anchor="middle" fill="#6e7681" font-size="9">Cap logica de negoci al client</text>

  <!-- Container 2: Smart Contract Algorand -->
  <rect x="330" y="180" width="240" height="120" rx="10" fill="#1c2128" stroke="#bc8cff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="180" width="240" height="26" rx="10" fill="#8b5cf6"/>
  <rect x="330" y="196" width="240" height="10" fill="#8b5cf6"/>
  <text x="450" y="198" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">SMART CONTRACT</text>
  <text x="450" y="228" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Votacio Algorand</text>
  <text x="450" y="246" text-anchor="middle" fill="#8b949e" font-size="10">algopy / TEAL / ARC-4 / AlgoKit</text>
  <text x="450" y="260" text-anchor="middle" fill="#8b949e" font-size="10">Box Storage + Local State</text>
  <text x="450" y="278" text-anchor="middle" fill="#6e7681" font-size="9">Router + Verificador + Schulze</text>

  <!-- Container 3: Anchoring -->
  <rect x="620" y="180" width="240" height="120" rx="10" fill="#1c2128" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="180" width="240" height="26" rx="10" fill="#238636"/>
  <rect x="620" y="196" width="240" height="10" fill="#238636"/>
  <text x="740" y="198" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">SERVEI D'ANCHORING</text>
  <text x="740" y="228" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Notary K-de-N</text>
  <text x="740" y="246" text-anchor="middle" fill="#8b949e" font-size="10">Python + Web3.py + Solidity</text>
  <text x="740" y="260" text-anchor="middle" fill="#8b949e" font-size="10">Ethereum Sepolia Testnet</text>
  <text x="740" y="278" text-anchor="middle" fill="#6e7681" font-size="9">SHA-256 + consens distribuit</text>

  <!-- Container 4: Node Algorand + Pera Wallet -->
  <rect x="185" y="400" width="240" height="120" rx="10" fill="#1c2128" stroke="#d29922" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="185" y="400" width="240" height="26" rx="10" fill="#9e6a03"/>
  <rect x="185" y="416" width="240" height="10" fill="#9e6a03"/>
  <text x="305" y="418" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">NODE ALGORAND</text>
  <text x="305" y="448" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Infraestructura Blockchain</text>
  <text x="305" y="466" text-anchor="middle" fill="#8b949e" font-size="10">Algorand PPoS/VRF + Docker</text>
  <text x="305" y="480" text-anchor="middle" fill="#8b949e" font-size="10">AlgoKit localnet</text>
  <text x="305" y="498" text-anchor="middle" fill="#6e7681" font-size="9">Nodes institucionals</text>

  <!-- Container 5: Pera Wallet -->
  <rect x="475" y="400" width="240" height="120" rx="10" fill="#1c2128" stroke="#d29922" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="475" y="400" width="240" height="26" rx="10" fill="#9e6a03"/>
  <rect x="475" y="416" width="240" height="10" fill="#9e6a03"/>
  <text x="595" y="418" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">PERA WALLET</text>
  <text x="595" y="448" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Custodia de claus</text>
  <text x="595" y="466" text-anchor="middle" fill="#8b949e" font-size="10">WalletConnect Protocol</text>
  <text x="595" y="480" text-anchor="middle" fill="#8b949e" font-size="10">Signatura delegada</text>
  <text x="595" y="498" text-anchor="middle" fill="#6e7681" font-size="9">Minim privilegi (DT-06)</text>

  <!-- Arrows: Votant -> Frontend -->
  <line x1="400" y1="138" x2="200" y2="178" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="280" y="155" text-anchor="middle" fill="#6e7681" font-size="9" transform="rotate(-12 280 155)">HTTPS</text>

  <!-- Arrows: Votant -> SC -->
  <line x1="450" y1="138" x2="450" y2="178" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrows: Frontend -> SC -->
  <line x1="280" y1="240" x2="328" y2="240" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="304" y="234" text-anchor="middle" fill="#58a6ff" font-size="9">algosdk</text>

  <!-- Arrows: SC -> Anchoring -->
  <line x1="570" y1="240" x2="618" y2="240" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="594" y="234" text-anchor="middle" fill="#58a6ff" font-size="9">hash</text>

  <!-- Arrows: Frontend -> Pera Wallet -->
  <line x1="200" y1="300" x2="555" y2="398" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>
  <text x="380" y="340" text-anchor="middle" fill="#6e7681" font-size="9">WalletConnect</text>

  <!-- Arrows: SC -> Node Algorand -->
  <line x1="420" y1="300" x2="340" y2="398" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="365" y="350" text-anchor="middle" fill="#6e7681" font-size="9">desplegat</text>

  <!-- Arrows: Node -> Pera -->
  <line x1="425" y1="460" x2="473" y2="460" stroke="#8b949e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="449" y="453" text-anchor="middle" fill="#6e7681" font-size="9">tx sign</text>

  <!-- Legend -->
  <rect x="40" y="555" width="820" height="50" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="60" y="572" width="14" height="14" rx="3" fill="none" stroke="#388bfd" stroke-width="1.5"/>
  <text x="82" y="584" fill="#8b949e" font-size="10">Frontend</text>
  <rect x="160" y="572" width="14" height="14" rx="3" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="182" y="584" fill="#8b949e" font-size="10">Smart Contract</text>
  <rect x="295" y="572" width="14" height="14" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="317" y="584" fill="#8b949e" font-size="10">Anchoring</text>
  <rect x="410" y="572" width="14" height="14" rx="3" fill="none" stroke="#d29922" stroke-width="1.5"/>
  <text x="432" y="584" fill="#8b949e" font-size="10">Infraestructura</text>
  <line x1="550" y1="579" x2="580" y2="579" stroke="#388bfd" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="592" y="584" fill="#8b949e" font-size="10">Dades</text>
  <line x1="650" y1="579" x2="680" y2="579" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="692" y="584" fill="#8b949e" font-size="10">Signatura</text>

  <!-- Watermark -->
  <text x="850" y="612" text-anchor="end" fill="#30363d" font-size="9">UIB 2026 — Blockchain Voting</text>
</svg>

# Orquestracio Docker del sistema de votacio descentralitzat.
#
# Pre-requisits:
#   1. algokit localnet start  (crea els contenidors d'Algorand)
#   2. Desplegar el contracte d'Algorand i obtenir APP_ID
#   3. Desplegar el NotaryContract i obtenir NOTARY_CONTRACT_ADDRESS
#   4. Configurar network/.env amb les claus de les universitats
#
# Us:
#   cd network/
#   docker compose up --build
#
# Referencia: BLOCKCHAIN.pdf §10.2

services:
  # Node Ethereum local (Hardhat) per a testing
  hardhat:
    build:
      context: ./ethereum
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    networks:
      - voting-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8545').then(r => process.exit(0)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Servei d'ancoratge -- Universitat de les Illes Balears
  anchoring-uib:
    build: ./anchoring
    environment:
      - UNIVERSITY_ID=uib
      - ALGOD_SERVER=http://host.docker.internal
      - ALGOD_PORT=${ALGOD_PORT:-4001}
      - ALGOD_TOKEN=${ALGOD_TOKEN:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      - APP_ID=${APP_ID}
      - ETHEREUM_RPC_URL=http://hardhat:8545
      - NOTARY_CONTRACT_ADDRESS=${NOTARY_CONTRACT_ADDRESS}
      - ANCHORING_PRIVATE_KEY=${UIB_ETH_PRIVATE_KEY}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - voting-net
    restart: unless-stopped

  # Servei d'ancoratge -- Universitat Politecnica de Catalunya
  anchoring-upc:
    build: ./anchoring
    environment:
      - UNIVERSITY_ID=upc
      - ALGOD_SERVER=http://host.docker.internal
      - ALGOD_PORT=${ALGOD_PORT:-4001}
      - ALGOD_TOKEN=${ALGOD_TOKEN:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      - APP_ID=${APP_ID}
      - ETHEREUM_RPC_URL=http://hardhat:8545
      - NOTARY_CONTRACT_ADDRESS=${NOTARY_CONTRACT_ADDRESS}
      - ANCHORING_PRIVATE_KEY=${UPC_ETH_PRIVATE_KEY}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - voting-net
    restart: unless-stopped

  # Servei d'ancoratge -- Universitat Autonoma de Barcelona
  anchoring-uab:
    build: ./anchoring
    environment:
      - UNIVERSITY_ID=uab
      - ALGOD_SERVER=http://host.docker.internal
      - ALGOD_PORT=${ALGOD_PORT:-4001}
      - ALGOD_TOKEN=${ALGOD_TOKEN:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
      - APP_ID=${APP_ID}
      - ETHEREUM_RPC_URL=http://hardhat:8545
      - NOTARY_CONTRACT_ADDRESS=${NOTARY_CONTRACT_ADDRESS}
      - ANCHORING_PRIVATE_KEY=${UAB_ETH_PRIVATE_KEY}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - voting-net
    restart: unless-stopped

networks:
  voting-net:
    driver: bridge
